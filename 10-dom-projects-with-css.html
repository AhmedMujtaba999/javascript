<!DOCTYPE html>
<html>

<head>
    <title>DOM-projects</title>
</head>
<style>
    body {
        font-family: Arial;

    }

    .subscribe-btn {

        border: none;
        background-color: black;
        color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        font-weight: bold;
        border-radius: 50px;
        cursor: pointer;
        margin-bottom: 30px;
    }

    .is-subscribed {
        background-color: rgb(240, 240, 240);
        color: black;
    }

    .cost-input {
        font-size: 15px;
        padding: 10px;
    }

    .calculate-btn {
        background-color: green;
        color: white;
        border: none;
        font-size: 15px;
        padding: 12px 15px;
        cursor: pointer;
    }

    .error-message {
        color: red;
    }
</style>

<body>
    <p> YouTube Subscribe Button</p>
    <button onclick="
    subscibe();
        " class="js-subscribe-btn subscribe-btn"> Subscribe </button>

    <p> Rock Paper Scissors
        <a href="09-rock-paper-scissors.html">click here</a>
    </p>

    <p> Amazon shipping calculator </p>
    <input class="js-cost-input cost-input" placeholder="cost of order" onKeydown=" 
        handleCostKeydown(event);
    ">
    <button onclick="calculatetotal();" class=calculate-btn>Calculate</button>
    <p> if cost is less than $40, shipping is $10 </p>
    <p> if cost is more than $40, shipping is free </p>
    <p class="js-total-cost"></p>
    <!-- an element to display the error message -->
     <p class="js-error-message error-message"></p>

    <script>

        //window.console.log('window'); // gives as the same as console.log
        // window.alert same as alert()

        // it is the global object window.document // give the same as document....
        // represents the window object, which is the global object in the browser environment. It represents the browser window or tab that contains the web page. The window object provides access to various properties and methods that allow you to interact with the browser and manipulate the content of the web page.

        function handleCostKeydown(event) {
            // console.log(event.key);
            if (event.key === 'Enter') {
                calculatetotal();
            }
        }
        function calculatetotal() {
            const inputElement = document.querySelector('.js-cost-input');
            let cost = Number(inputElement.value) * 100; // value will be in string format so convert it to number using Number() function
        // first reset all previous messages
        document.querySelector('.js-total-cost').innerHTML = '';
        document.querySelector('.js-error-message').innerHTML = '';

        if(cost < 0){
            
            document.querySelector('.js-error-message').innerHTML = 'Error: cost cannot be less than $0';
            return; // exit the function early if cost is less than 0
        }
             if (cost < 4000) {
                cost += 1000;
             }
          
            document.querySelector('.js-total-cost').innerHTML = `Total cost: $${(cost / 100).toFixed(2)}`;
      
        
        }
        function subscibe() {
            const buttonElement = document.querySelector('.js-subscribe-btn');

            if (buttonElement.innerText === 'Subscribe') {

                buttonElement.innerHTML = 'Subscribed!';
                buttonElement.classList.add('is-subscribed'); // classList is the another project of js where u can add another class to have different style 

            } else {
                buttonElement.innerHTML = 'Subscribe';
                buttonElement.classList.remove('is-subscribed'); // remove the class from the class
            }

        }




    </script>
</body>

</html>
