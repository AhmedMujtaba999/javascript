<!DOCTYPE html>
<html>

<title>exercise</title>
<style>

    <body>
        <script>
            let name = "Ahmed";
            console.log(`My name is: ${name}`); // this will print "My name is: Ahmed" in the console
            let coffee = 5;
            let bagels = 3;
            let soup = 9;
            let cost = coffee + bagels*2 + soup;
            console.log(`Cost of food: $${cost}`); // this will print "Cost of food: $20" in the console
            let tax = cost *0.1; // this will calculate the tax as 10% of the cost
            console.log(`Tax (10%) : $${tax}`); // this will print "Tax (10%) : $2" in the console
            let totalCost = cost + tax;
            console.log(`Total cost: $${totalCost}`); // this will print "Total cost: $22" in the console
            
        </script>
    </body>
</html>
