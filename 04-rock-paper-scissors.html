<button
      onclick="
     const randomNumber = Math.random();
     let computerMove = '';
     let result ='';
     if ( randomNumber >=0 && randomNumber < 1/3){
          computerMove = 'Rock';
     } else if ( randomNumber >= 1/3 && randomNumber < 2/3){
          computerMove = 'Paper';
     } else {
          computerMove = 'Scissors';
     }
     
     if(computerMove === 'Rock'){
          result = 'Tie';}
          else if (computerMove === 'Paper'){
            result =' You Lose';}
            else {
                result = 'You Win';}   
                
                alert(`Your move: Rock; Computer move: ${computerMove}; Result: ${result}`);
      "
> Rock </button>
