<!DOCTYPE html>
<!-- // use modern html5 doctype -->
<html>
<!-- represents the entire the webpage -->

<head>
    <!-- // contains information about the page (webpage), everything not visible on the webpage is inside this tag -->
    <title>Rock Paper Scissors</title>
    <!-- // the title of the webpage, it is shown in the browser tab -->
    <style>
        .link-style {
            color: purple;
            text-decoration: underline;
        }
    </style>

</head>

<body>
    <p> Rock Paper Scissors</p>
    <button onclick="playGame('Rock');"> Rock </button>
    <button onclick="playGame('Paper');"> Paper </button>
    <button onclick="playGame('Scissors');"> Scissors </button>
    <p class="js-result"></p>
    <p class="js-moves"></p>
    <p class="js-score"></p>


    <button onclick="
    score.wins = 0;
    score.losses =0;
    score.ties =0;
    localStorage.removeItem('score');
    updateScoreElement();
    " class="js-reset-btn">Reset Score</button>

    <p> <a href="10-rock-paper1.html" class="link-style">Click here</a> to see the final project </p>

    <!-- // it is suppose to contain everything that is visible on the webpage -->
    <script>
        //loading page
        let score = JSON.parse(localStorage.getItem('score')) || {
            wins: 0,
            losses: 0,
            ties: 0
        };// getting a item from localstorage and again converting it to object. and setting a default value

        updateScoreElement();

        
        //    if(!score){ // if score is null keep a default value of score 
        //  if score === null ==> true, ---> same as !score ==> true
        //     score ={
        //         wins: 0,
        //         losses: 0,
        //         ties: 0
        //     };
        //    } 
          

        function playGame(playerMove) {
            const computerMove = pickComputerMove();

            let result = '';

            if (playerMove === 'Scissors') {
                if (computerMove === 'Rock') {
                    result = 'You lose';
                }
                else if (computerMove === 'Paper') {
                    result = 'You Win';
                }
                else if (computerMove === 'Scissors') {
                    result = ' Tie ';
                }

            } else if (playerMove === 'Paper') {
                if (computerMove === 'Rock') {
                    result = 'You Win';
                }
                else if (computerMove === 'Paper') {
                    result = ' Tie ';
                }
                else if (computerMove === 'Scissors') {
                    result = 'You lose';
                }

            } else if (playerMove === 'Rock') {
                if (computerMove === 'Rock') {
                    result = 'Tie';
                }
                else if (computerMove === 'Paper') {
                    result = ' You lose';
                }
                else if (computerMove === 'Scissors') {
                    result = 'You Win';
                }

            }

            if (result === 'You Win') {
                score.wins += 1;
            } else if (result === 'You lose') {
                score.losses += 1;
            } else if (result === 'Tie') {
                score.ties += 1;
            }

            localStorage.setItem('score', JSON.stringify(score));
             document.querySelector('.js-result').innerHTML = `Result: ${result}`;
             document.querySelector('.js-moves').innerHTML = `Your move: ${playerMove}. Computer move: ${computerMove}.`;

            // alert(`Your move: ${playerMove}. Computer move: ${computerMove}. Result: ${result}\nWins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);
            updateScoreElement();
        }
function updateScoreElement() {
            document.querySelector('.js-score').innerHTML = `Wins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`;
        }

        function pickComputerMove() {
            const randomNumber = Math.random();
            let computerMove = '';

            if (randomNumber >= 0 && randomNumber < 1 / 3) {
                computerMove = 'Rock';
            } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
                computerMove = 'Paper';
            } else {
                computerMove = 'Scissors';
            }
            return computerMove;
        }

    </script>
</body>

</html>
