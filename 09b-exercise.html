<!DOCTYPE html>
<html>

<head>
    <title>9d exercise</title>
</head>

<body>
    <input class="js-name" placeholder="Enter your name" onkeydown="
                handleKeydown(event);">
    <button class="js-submit-btn" onclick="
            submitname();
            ">Submit</button>
    <p class="js-display-name"></p>
    <script>
        function handleKeydown(event) {
            if (event.key === 'Enter') {
                submitname();
            }
        }
        function submitname() {
            let inputElement = document.querySelector('.js-name').value;
            document.querySelector('.js-display-name').innerHTML = `your name is: ${inputElement}`;
        }

    </script>
</body>

</html>
