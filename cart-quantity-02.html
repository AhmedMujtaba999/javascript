<!DOCTYPE html>
<html>
  <head>
    <title>Cart Quantity-06</title>
  </head>

  <body>
    <p>Cart Quantity</p>

    <button onclick="console.log(`Cart Quantity: ${count}`)">
      Show Quantity
    </button>

    <button onclick="
      if (count + 1 > 10) {
        alert('The cart is full');
        return; 
      } 
        count++;
        console.log(`Cart Quantity: ${count}`);
      
    ">
      Add to Cart
    </button>

    <button onclick="
      if (count + 2 > 10) {
        alert('The cart is full');
        return;
      } 
        count += 2;
        console.log(`Cart Quantity: ${count}`);
      
    ">
      +2
    </button>

    <button onclick="
      if (count + 3 > 10) {
        alert('The cart is full');
        return;
      } 
        count += 3;
        console.log(`Cart Quantity: ${count}`);
      
    ">
      +3
    </button>

    <button onclick="
      if (count + 4 > 10) {
        alert('The cart is full');
        return;
      } 
        count += 4;
        console.log(`Cart Quantity: ${count}`);
      
    ">
      +4
    </button>

    <button onclick="
      if (count + 5 > 10) {
        alert('The cart is full');
        return;
      } 
        count += 5;
        console.log(`Cart Quantity: ${count}`);
      
    ">
      +5
    </button>

    <button onclick="
      if (count - 1 < 0) {
        alert('Not Enough Items in the Cart');
        return;
      } 
        count--;
        console.log(`Cart Quantity: ${count}`);
      
    ">
      Remove from Cart
    </button>

    <button onclick="
      if (count - 2 < 0) {
        alert('Not Enough Items in the Cart');
        return;
      }
        count -= 2;
        console.log(`Cart Quantity: ${count}`);
      
    ">
      -2
    </button>

    <button onclick="
      if (count - 3 < 0) {
        alert('Not Enough Items in the Cart');
        return;
      } 
        count -= 3;
        console.log(`Cart Quantity: ${count}`);
      
    ">
      -3
    </button>

    <button onclick="
      count = 0;
      console.log('Cart was reset.');
      console.log(`Cart Quantity: ${count}`);
    ">
      Reset Cart
    </button>

    <script>
      let count = 0;
    </script>
  </body>
</html>
