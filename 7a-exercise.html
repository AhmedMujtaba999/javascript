            <script>

                    function convertToFahrenheit(celsius){
                        let fahrenheit;
                        fahrenheit = (celsius*9/5) +32
                        return fahrenheit;
                    }
                  //  console.log(convertToFahrenheit(25));

                    function convertToCelsius(fahrenheit){
                        let celsius = (fahrenheit -32) *5/9;
                        return celsius;
                    }
                   // console.log(convertToCelsius(86));

                    function convertTemperature(degrees, unit){
                        let convertedValue;
                         if( unit === 'C'){
                            convertedValue =convertToFahrenheit(degrees).toString();
                            convertedValue += 'F'
                        }
                       else if( unit === 'F'){
                            convertedValue = convertToCelsius(degrees).toString();
                            convertedValue += 'C'
                        }
                       return convertedValue;
                    }
                    console.log(convertTemperature(25, 'C'));
                    console.log(convertTemperature(86, 'F'));

                    function convertLength(length, from, to){
                        if(from==='km' && to ==='miles'){
                            length = Math.round(length*0.621.toString());
                            length += 'miles';
                        }
                        else if(from === 'miles' && to === 'km'){
                            length = Math.round(length*1.6.toString());
                            length += 'km';
                        }
                        else if( from === 'km' && to ==='km'){
                            length = length.toString();
                            length += 'km';
                        }
                        return length;
                    }

                    console.log(convertLength(50,'miles', 'km'));
                    console.log(convertLength(32, 'km', 'miles'));
                    console.log(convertLength(50, 'km', 'km'));
