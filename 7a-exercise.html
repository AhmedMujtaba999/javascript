                    function convertLength(length, from, to){
                        let unit = ['miles', 'ft', 'km'];

                            if (!unit.includes(from)) {
                            console.log(`invalid unit: from ${from}`);
                            } else if (!unit.includes(to)) {
                            console.log(`invalid unit: to ${to}`);
                            }

                        if(from==='km' && to ==='miles'){
                        length = Math.round(length*0.621.toString());
                        length += 'miles';
                        return length;
                        }
                        else if(from === 'miles' && to === 'km'){
                            length = Math.round(length*1.6.toString());
                            length += 'km';
                            return length;
                        }
                        else if( from === 'km' && to ==='km'){
                            length = length.toString();
                            length += 'km';
                            return length;
                        }else if( from === 'miles'&& to ==='ft'){
                            length = String(length*5280);
                            length += 'ft'; 
                            return length;
                        }else if( from === 'km'&& to ==='ft'){
                            length = String(length*3281);
                            length += 'ft';
                            return length;
                        }
                      
                    }

                    console.log(convertLength(5,'miles', 'km'));
                    console.log(convertLength(32, 'km', 'miles'));
                    console.log(convertLength(50, 'km', 'km'));
