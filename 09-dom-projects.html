<!DOCTYPE html>
<html>

<head>
    <title>DOM-projects</title>
</head>

<body>
    <p> YouTube Subscribe Button</p>
    <button onclick="
    subscibe();
        " class="js-subscribe-btn"> Subscribe </button>

    <p> Rock Paper Scissors
        <a href="09-rock-paper-scissors.html">click here</a>
    </p>

    <p> Amazon shipping calculator </p>
    <input class="js-cost-input" placeholder="cost of order" onKeydown=" 
        handleCostKeydown(event);
    ">
    <button onclick="calculatetotal()">Calculate</button>
    <p> if cost is less than $40, shipping is $10 </p>
    <p> if cost is more than $40, shipping is free </p>
    <p class="js-total-cost"></p>

    <script>

            //window.console.log('window'); // gives as the same as console.log
            // window.alert same as alert()

           // it is the global object window.document // give the same as document....
         // represents the window object, which is the global object in the browser environment. It represents the browser window or tab that contains the web page. The window object provides access to various properties and methods that allow you to interact with the browser and manipulate the content of the web page.

        function handleCostKeydown(event) {
           // console.log(event.key);
            if (event.key === 'Enter') {
                calculatetotal();
            }
        }
        function calculatetotal() {
            const inputElement = document.querySelector('.js-cost-input');
            let cost = Number(inputElement.value); // value will be in string format so convert it to number using Number() function
            // console.log(typeof cost);
            if (cost < 40) {
                cost += 10;
                //console.log(cost);

            }
            document.querySelector('.js-total-cost').innerHTML = `Total cost: $${cost}`;
        }
        function subscibe() {
            const buttonElement = document.querySelector('.js-subscribe-btn');

            if (buttonElement.innerText === 'Subscribe') {

                buttonElement.innerHTML = 'Subscribed!';

            } else {
                buttonElement.innerHTML = 'Subscribe';
            }

        }




    </script>
</body>

</html>
